<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farzad Ghanouni - Resume</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Global scrolling */
        html { scroll-behavior: smooth; }
        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
        }

        /* --- General Body and Layout Styling --- */
        body {
            line-height: 1.7;
            background-color: #f8f9fa;
            color: #4a4a4a;
            margin: 0;
            padding: 0;
            background-image: 
                linear-gradient(to right, #e9ecef 1px, transparent 1px), 
                linear-gradient(to bottom, #e9ecef 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            max-width: 850px;
            margin: 30px auto;
            padding: 40px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        
        /* --- Integrated Header Styling --- */
        .resume-header {
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e8e8e8;
            flex-wrap: wrap; /* Allow wrapping for responsiveness */
        }

        .lang-switcher-wrapper {
            direction: ltr; 
            display: flex; 
            align-items: center; 
        }
        .lang-switcher-wrapper button {
            font-family: 'Lato', 'Vazirmatn', sans-serif;
            font-size: 0.9em;
            font-weight: 700;
            margin: 0 5px;
            border: 2px solid #148F77;
            background-color: transparent;
            color: #148F77;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100px;
            height: 38px;
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .lang-switcher-wrapper button.active,
        .lang-switcher-wrapper button:hover {
            background-color: #148F77;
            color: #ffffff;
        }

        /* --- Section Styling with Dividers --- */
        .section {
            padding-bottom: 25px;
            margin-bottom: 25px;
            border-bottom: 1px solid #e8e8e8;
        }
        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        /* Justify the paragraph text in sections (About Me) */
        .section p {
            text-align: justify;
            text-justify: inter-word;
            margin-top: 0;
        }

        /* --- Typography and Heading Styles --- */
        h1 {
            color: #2c3e50;
            font-size: 2.8em;
            font-weight: 700;
            margin: 0;
        }

        h2 {
            color: #2c3e50;
            font-weight: 700;
            border-bottom: 2px solid #148F77;
            padding-bottom: 8px;
            margin: 0 0 25px 0;
        }

        h3 {
            color: #333;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        strong {
             font-weight: 700;
             color: #333;
        }

        /* --- Links and Contact Info --- */
        a {
            color: #148F77;
            text-decoration: none;
        }

        .contact-info {
            text-align: center;
            font-size: 1.1em;
            color: #555;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px 25px;
        }
        .contact-item {
            display: flex;
            align-items: center;
        }
        .contact-icon {
            width: 18px;
            height: 18px;
        }
        
        /* --- General Section-Specific Styling --- */
        ul { list-style-type: disc; }
        li { margin-bottom: 12px; }

        .job-title {
            font-weight: 700;
            font-size: 1.1em;
            color: #333;
        }

        .company {
            font-style: italic;
            color: #666;
            margin-bottom: 10px;
            display: block;
        }

        .job-entry { margin-bottom: 25px; }
        .job-entry:last-child { margin-bottom: 0; }

        /* --- Language-Specific Styles --- */
        #resume-en {
            font-family: 'Lato', sans-serif;
            text-align: left;
        }
        #resume-en .lang-switcher-wrapper { margin-left: auto; } 
        #resume-en .date { float: right; }
        #resume-en .contact-icon { margin-right: 8px; }
        #resume-en ul { padding-left: 25px; }
        #resume-en h1 { text-align: left; }
        #resume-en h2 { font-size: 1.4em; }
        #resume-en h3 { font-size: 1.1em; }

        #resume-fa {
            font-family: 'Vazirmatn', sans-serif;
            text-align: right;
            display: none;
        }
        #resume-fa .lang-switcher-wrapper { margin-right: auto; }
        #resume-fa .date { float: left; }
        #resume-fa .contact-info { direction: ltr; }
        #resume-fa .contact-item { flex-direction: row-reverse; }
        #resume-fa .contact-icon { margin-left: 8px; }
        #resume-fa ul { padding-right: 25px; }
        #resume-fa h1 { text-align: right; }
        #resume-fa h2 { font-size: 1.5em; }
        #resume-fa h3 { font-size: 1.2em; }
        
        /* --- Media Queries for Responsive Design --- */

        /* For Tablets and smaller devices (<= 768px) */
        @media (max-width: 768px) {
            .container {
                margin: 20px auto;
                padding: 25px;
            }

            .resume-header {
                flex-direction: column; /* Stack header items vertically */
                align-items: center; /* Align items centrally */
                gap: 20px; /* Add space between title and buttons */
            }
             #resume-fa .resume-header {
                 align-items: center;
            }

            h1 {
                font-size: 2.2em; /* Reduce font size for smaller screens */
                 text-align: center;
                 width: 100%;
            }

            h2 {
                font-size: 1.3em; /* Adjust section titles */
            }
            #resume-fa h2 {
                 font-size: 1.4em;
            }

            .contact-info {
                flex-direction: column; /* Stack contact items */
                align-items: center; /* Center them */
                gap: 10px;
            }

            /* Un-float dates and position them cleanly */
            .date {
                float: none; 
                font-weight: 700;
                color: #555;
                margin-bottom: 5px;
                text-align: left; /* Ensure consistent alignment */
                display: block;
            }
            
            #resume-fa .date {
                 text-align: right;
            }

            /* Remove auto margins to allow for new centering */
            #resume-en .lang-switcher-wrapper,
            #resume-fa .lang-switcher-wrapper {
                margin: 0; 
                width: 100%;
                justify-content: center;
            }
        }

        /* For Mobile phones (<= 480px) */
        @media (max-width: 480px) {
            body {
                line-height: 1.6;
            }
            
            .container {
                margin: 0;
                padding: 20px;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            h1 {
                font-size: 1.8em; /* Further reduce font size */
            }
            h2 {
                font-size: 1.2em;
            }
             #resume-fa h2 {
                 font-size: 1.3em;
            }

            ul {
                padding-left: 20px; /* Reduce list indentation */
            }
             #resume-fa ul {
                padding-right: 20px;
            }
            
            .lang-switcher-wrapper button {
                width: 90px; /* Make buttons slightly smaller */
                height: 36px;
            }
        }

        /* --- Tap to Top Button (circle & closer to edges) --- */
        #tapToTop {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 9999;
            background-color: #148F77;
            color: #ffffff;
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease, background-color 0.2s ease;
        }
        #tapToTop.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        #tapToTop:hover {
            background-color: #0f6f5c;
        }
        /* Mirror position in RTL */
        :root[dir="rtl"] #tapToTop {
            right: auto;
            left: 15px;
        }
        /* Icon sizing inside button */
        #tapToTop svg {
            width: 20px;
            height: 20px;
            display: block;
        }
    </style>
</head>
